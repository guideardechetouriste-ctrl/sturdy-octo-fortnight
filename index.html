<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explora Guide - Randonnées en Ardèche</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }
        header {
            background-color: #ff3344;
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        header h1 { margin: 0; font-size: 2.5em; }
        header p { margin: 10px 0 0; font-size: 1.2em; opacity: 0.9; }
        
        .contact-section {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        .contact-section h2 { color: #1a1a1a; margin-bottom: 10px; font-size: 24px; }
        .contact-section p { color: #666; margin-bottom: 25px; font-size: 14px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: #333; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; background-color: #fafafa;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: #ff3344; outline: none; background-color: #fff; }
        .submit-btn {
            background-color: #ff3344; color: white; padding: 14px 20px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #e02233; }
        footer { text-align: center; padding: 20px; font-size: 12px; color: #999; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>Explora Guide</h1>
        <p>Votre guide professionnel pour explorer l'Ardèche</p>
    </header>

    <section class="contact-section">
        <h2>Contactez le Guide Explora</h2>
        <p>Une question sur une sortie ? Une envie de randonnée sur mesure en Ardèche ? Laissez-moi un message et je vous répondrai au plus vite !</p>
        
        <form action="https://formspree.io/f/xjgzbdnj" method="POST">
            
            <div class="form-group">
                <label for="name">Nom / Prénom</label>
                <input type="text" id="name" name="name" placeholder="Votre nom" required>
            </div>

            <div class="form-group">
                <label for="email">Adresse E-mail</label>
                <input type="email" id="email" name="_replyto" placeholder="votre@email.com" required>
            </div>

            <div class="form-group">
                <label for="subject">Sujet de votre message</label>
                <input type="text" id="subject" name="subject" placeholder="Ex: Réservation, Randonnée privée..." required>
            </div>

            <div class="form-group">
                <label for="message">Votre Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Dites-moi tout sur votre projet de sortie..." required></textarea>
            </div>

            <input type="text" name="_gotcha" style="display:none">
            <button type="submit" class="submit-btn">Envoyer le message</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Explora Guide. Tous droits réservés.</p>
    </footer>

</body>
</html>
