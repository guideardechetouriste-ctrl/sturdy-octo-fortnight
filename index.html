<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pierre François Passager – Guide Touristique Ardèche</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --stone:   #a8c8a0;
      --earth:   #3a7d44;
      --dark:    #0f2d16;
      --deep:    #163d20;
      --cream:   #f4faf4;
      --river:   #2e7d52;
      --river-light: #6abf8a;
      --accent:  #2e8b57;
      --gold:    #4caf76;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--cream);
      color: var(--dark);
      overflow-x: hidden;
      cursor: default;
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content:'';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: .35;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: rgba(26,16,8,.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(200,184,154,.15);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--stone);
      letter-spacing: .08em;
    }
    .nav-logo span { color: var(--gold); font-style: italic; }
    .nav-links { display: flex; gap: 2.2rem; }
    .nav-links a {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--stone);
      text-decoration: none;
      transition: color .25s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-cta {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: .6rem 1.4rem;
      cursor: pointer;
      text-decoration: none;
      transition: background .25s;
    }
    .nav-cta:hover { background: #8c2018; }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      overflow: hidden;
    }

    .hero-left {
      background: var(--deep);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8rem 4rem 4rem 5rem;
      position: relative;
      z-index: 2;
    }
    .hero-left::after {
      content: '';
      position: absolute;
      right: -60px;
      top: 0; bottom: 0;
      width: 120px;
      background: var(--deep);
      clip-path: polygon(0 0, 40% 0, 100% 50%, 40% 100%, 0 100%);
      z-index: 3;
    }

    .hero-eyebrow {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      animation: fadeUp .8s ease both;
    }
    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.8rem, 5vw, 4.5rem);
      font-weight: 700;
      color: var(--cream);
      line-height: 1.05;
      margin-bottom: .6rem;
      animation: fadeUp .8s .15s ease both;
    }
    .hero-name em {
      display: block;
      font-style: italic;
      color: var(--stone);
      font-size: .65em;
      font-weight: 400;
    }
    .hero-title {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .85rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--river-light);
      margin-bottom: 2.2rem;
      animation: fadeUp .8s .3s ease both;
    }
    .hero-desc {
      font-size: 1.15rem;
      font-weight: 300;
      line-height: 1.8;
      color: rgba(247,237,224,.75);
      max-width: 420px;
      margin-bottom: 2.8rem;
      animation: fadeUp .8s .45s ease both;
    }
    .hero-btn {
      display: inline-block;
      font-family: 'Josefin Sans', sans-serif;
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      background: transparent;
      border: 1.5px solid var(--gold);
      color: var(--gold);
      padding: .9rem 2.2rem;
      text-decoration: none;
      transition: background .25s, color .25s;
      animation: fadeUp .8s .6s ease both;
    }
    .hero-btn:hover { background: var(--gold); color: var(--dark); }

    .hero-right {
      position: relative;
      overflow: hidden;
    }
    .hero-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: sepia(15%) contrast(1.05);
    }
    .hero-right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(43,26,8,.45) 0%, transparent 60%);
      z-index: 1;
    }
    .hero-badge {
      position: absolute;
      bottom: 3rem;
      left: 2rem;
      z-index: 2;
      background: rgba(26,16,8,.82);
      border: 1px solid var(--gold);
      padding: 1rem 1.5rem;
      backdrop-filter: blur(8px);
      animation: fadeUp .8s .9s ease both;
    }
    .hero-badge p {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .65rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--stone);
    }
    .hero-badge strong {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-top: .15rem;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      z-index: 10;
      animation: fadeUp 1s 1.2s ease both;
    }
    .scroll-hint span {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .6rem;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--stone);
    }
    .scroll-line {
      width: 1px;
      height: 40px;
      background: var(--stone);
      animation: scrollLine 2s infinite;
    }
    @keyframes scrollLine {
      0%   { transform: scaleY(0); transform-origin: top; }
      50%  { transform: scaleY(1); transform-origin: top; }
      51%  { transform: scaleY(1); transform-origin: bottom; }
      100% { transform: scaleY(0); transform-origin: bottom; }
    }

    @keyframes fadeUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── SECTION COMMON ── */
    section { position: relative; }
    .section-label {
      font-family: 'Josefin Sans', sans-serif;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: .8rem;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 1.2rem;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: var(--gold);
      margin-bottom: 2rem;
    }

    /* ── À PROPOS ── */
    .about {
      background: var(--cream);
      padding: 7rem 5rem;
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 5rem;
      align-items: center;
    }
    .about-visual {
      position: relative;
    }
    .about-photo-wrap {
      position: relative;
      padding-bottom: 4rem;
      padding-right: 4rem;
    }
    .about-photo-wrap img {
      width: 100%;
      aspect-ratio: 4/5;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: sepia(10%);
    }
    .about-frame {
